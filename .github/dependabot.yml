version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/.github/workflows'
    schedule:
      interval: 'weekly'
      time: '04:00'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      time: '04:00'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
      - 'npm'
