services:
  app:
    build: .
    env_file: .env
    environment:
      - NODE_ENV=production
      - STORYTUNE__MONGODB_URI=mongodb://storytune:${MONGO_PASSWORD}@mongo:27017/storytune
    volumes:
      - card_data:/opt/storytune/cards
      - inspiration_data:/opt/storytune/inspiration
      - ./emails/templates:/opt/storytune/emails/templates:ro
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  mongo:
    image: mongo:7
    environment:
      - MONGO_INITDB_ROOT_USERNAME=storytune
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
      - MONGO_INITDB_DATABASE=storytune
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - internal
      - external

networks:
  internal:
  external:

volumes:
  mongo_data:
  card_data:
  inspiration_data:
