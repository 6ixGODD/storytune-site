upstream storytune_app {
    server app:3000;
}

server {
    listen 80;
    server_name _;

    # Redirect all HTTP to HTTPS (uncomment when SSL is configured)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://storytune_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Serve uploaded card assets with caching
    location ~* \.(js|css|png|jpg|jpeg|gif|webp|ico|woff2?|ttf|svg)$ {
        proxy_pass http://storytune_app;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    client_max_body_size 50M;
}

