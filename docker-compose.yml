# Base compose file — defines the app build only.
# Use with an overlay for a runnable stack:
#   Local test:  docker compose -f docker-compose.yml -f docker-compose.local.yml up -d
#   Production:  docker compose -f docker-compose.yml -f docker-compose.prod.yml  up -d

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: storytune-app:latest
    restart: unless-stopped

networks:
  internal:
  external:

volumes:
  mongo_data:
  card_data:
  inspiration_data:
